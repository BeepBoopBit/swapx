suggestions:
  - name: cat-to-bat
    description: Replace cat with bat for syntax highlighting
    detect:
      bin: bat
    rules:
      - match: "cat "
        replace:
          - label: use bat
            with: "bat "
            default: true
          - label: keep original
            with: "cat "

  - name: ls-to-eza
    description: Replace ls with eza for better file listing
    detect:
      bin: eza
    rules:
      - match: "ls"
        replace:
          - label: use eza
            with: "eza"
            default: true
          - label: keep original
            with: "ls"

  - name: grep-to-rg
    description: Replace grep with ripgrep for faster searching
    detect:
      bin: rg
    rules:
      - match: "grep "
        replace:
          - label: use rg
            with: "rg "
            default: true
          - label: keep original
            with: "grep "

